<style>
  .landing-hero {
    text-align: center;
    padding: 60px 20px 40px;
  }
  .landing-avatar {
    font-size: 4em;
    margin-bottom: 16px;
  }
  .landing-title {
    font-size: 2.8em;
    background: linear-gradient(90deg, var(--accent), var(--gold), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .landing-subtitle {
    color: var(--text-dim);
    font-size: 1.1em;
  }

    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));

    margin-top: 20px;
  }
  .landing-card {
    display: block;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    text-decoration: none;
    color: inherit;
  }
  .landing-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }
  .card-wild:hover { border-color: var(--accent); }
  .card-test:hover { border-color: var(--green); }
  .card-icon {
    font-size: 2.4em;
    display: block;
    margin-bottom: 12px;
  }
  .landing-card h2 {
    color: var(--text);
    font-size: 1.4em;
    margin-bottom: 8px;
  }
  .landing-card p {
    color: var(--text-dim);
    font-size: 0.95em;
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .card-tag {
    display: inline-block;
    font-size: 0.78em;
    padding: 3px 12px;
    border-radius: 12px;
  }
  .card-wild .card-tag {
    background: rgba(233,69,96,0.15);
    color: var(--accent);
    border: 1px solid rgba(233,69,96,0.3);
  }
  .card-test .card-tag {
    background: rgba(78,204,163,0.15);
    color: var(--green);
    border: 1px solid rgba(78,204,163,0.3);
  }
  @media (max-width: 600px) {
    .landing-title { font-size: 2em; }
    .landing-hero { padding: 40px 16px 24px; }
  }
</style>
