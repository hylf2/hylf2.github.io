<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | strip_html | truncatewords: 30 | default: site.description }}">
  {% feed_meta %}
  <style>
    :root {
      --bg-dark: #1a1a2e;
      --bg-card: #16213e;
      --bg-card-hover: #1a2744;
      --accent: #e94560;
      --accent2: #0f3460;
      --text: #eaeaea;
      --text-dim: #8892b0;
      --gold: #ffd700;
      --green: #4ecca3;
      --border: rgba(233,69,96,0.3);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--gold); }
    .site-header {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      padding: 20px 40px;
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-header h1 {
      font-size: 1.6em;
      background: linear-gradient(90deg, var(--accent), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .site-header h1 a { color: inherit; -webkit-text-fill-color: inherit; }
    .site-nav { display: flex; gap: 20px; }
    .site-nav a {
      color: var(--text-dim);
      font-size: 0.95em;
      padding: 6px 12px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }
    .site-nav a:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
    .post-header { margin-bottom: 30px; }
    .post-header h1 {
      font-size: 2.2em;
      color: var(--gold);
      margin-bottom: 10px;
      line-height: 1.3;
    }
    .post-meta {
      color: var(--text-dim);
      font-size: 0.9em;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .post-meta .tag {
      background: rgba(233,69,96,0.15);
      border: 1px solid var(--border);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.85em;
      color: var(--accent);
    }
    .post-content { margin-bottom: 40px; }
    .post-content h2 {
      color: var(--green);
      font-size: 1.5em;
      margin: 36px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(78,204,163,0.2);
    }
    .post-content h3 {
      color: var(--accent);
      font-size: 1.2em;
      margin: 24px 0 12px;
    }
    .post-content p { margin-bottom: 14px; color: var(--text-dim); }
    .post-content strong { color: var(--text); }
    .post-content ul, .post-content ol {
      margin: 12px 0;
      padding-left: 24px;
      color: var(--text-dim);
    }
    .post-content li { margin-bottom: 6px; }
    .post-content blockquote {
      border-left: 3px solid var(--accent);
      padding: 10px 16px;
      margin: 16px 0;
      background: rgba(233,69,96,0.05);
      color: var(--text-dim);
    }
    .post-content code {
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
      color: var(--green);
    }
    .post-content pre {
      background: #0d1117;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 16px 0;
    }
    .post-content pre code {
      background: none;
      padding: 0;
      color: var(--text);
    }
    .post-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      border-radius: 8px;
      overflow: hidden;
    }
    .post-content th {
      background: var(--accent2);
      padding: 10px 14px;
      text-align: left;
      color: var(--text);
      font-weight: 600;
    }
    .post-content td {
      padding: 8px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: var(--text-dim);
      background: var(--bg-card);
    }
    .post-content img {
      max-width: 100%;
      border-radius: 8px;
      margin: 16px 0;
    }
    .post-nav {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .post-nav a {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 0.9em;
      max-width: 45%;
      transition: border-color 0.2s;
    }
    .post-nav a:hover { border-color: var(--accent); }
    .site-footer {
      text-align: center;
      padding: 30px;
      color: var(--text-dim);
      font-size: 0.85em;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: 40px;
    }
    @media (max-width: 600px) {
      .site-header { flex-direction: column; gap: 12px; padding: 16px; }
      .post-header h1 { font-size: 1.6em; }
      .container { padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1><a href="{{ '/' | relative_url }}">🌌 Deep Dark</a></h1>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}">首页</a>
      <a href="{{ '/welcome/' | relative_url }}">测试欢迎</a>
      <a href="{{ '/wild-eternal-night/' | relative_url }}">荒野永夜</a>
      <a href="{{ '/about/' | relative_url }}">关于</a>
    </nav>
  </header>
  <main class="container">
    {{ content }}
  </main>
  <footer class="site-footer">
    Deep Dark © {{ site.time | date: '%Y' }} | 由 <a href="https://github.com/hylf2">hylf2</a> 驱动
  </footer>
</body>
</html>
